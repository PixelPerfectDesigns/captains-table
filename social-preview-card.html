<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;font-family:'Georgia',serif}
  .card{
    position:relative;width:1200px;height:630px;
    background:#1B3A5C;
  }
  .bg{
    position:absolute;inset:0;
    background-image:url('http://localhost:3000/brand_assets/afterdeck_bar.jpg');
    background-size:cover;background-position:center 40%;
    opacity:.45;
  }
  .overlay{
    position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(26,18,8,.95) 0%,rgba(27,58,92,.85) 50%,rgba(27,58,92,.65) 100%);
  }
  .frame{
    position:absolute;inset:24px;z-index:2;
    border:1px solid rgba(200,131,42,.22);
    pointer-events:none;
  }
  .content{
    position:relative;z-index:3;
    display:flex;flex-direction:column;
    justify-content:space-evenly;align-items:center;
    text-align:center;
    height:100%;padding:48px 80px;
  }
  .eyebrow{
    font-family:'Georgia',serif;
    font-size:15px;font-weight:400;letter-spacing:.34em;text-transform:uppercase;
    color:rgba(200,131,42,.9);
  }
  .wordmark{
    height:148px;width:auto;display:block;
    filter:drop-shadow(0 4px 24px rgba(0,0,0,.5));
  }
  .divider{
    width:56px;height:2px;background:#C8832A;margin:0 auto;opacity:.7;
  }
  .tagline{
    font-family:'Georgia',serif;font-style:italic;
    font-size:46px;color:rgba(244,237,216,.9);
    line-height:1.3;
    letter-spacing:.01em;
  }
  .meta{
    display:flex;align-items:center;gap:16px;
    font-family:'Arial',sans-serif;font-size:13px;font-weight:700;
    letter-spacing:.2em;text-transform:uppercase;
    color:rgba(244,237,216,.45);
  }
  .dot{width:3px;height:3px;border-radius:50%;background:rgba(200,131,42,.6)}
  .domain{
    position:absolute;bottom:40px;right:60px;z-index:3;
    font-family:'Arial',sans-serif;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(244,237,216,.22);
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="frame"></div>
  <div class="content">
    <div class="eyebrow">Est. 1934 &nbsp;·&nbsp; Monroe, NY</div>
    <img class="wordmark" src="http://localhost:3000/brand_assets/captains_wordmark.png" alt="The Captain's Table">
    <div class="divider"></div>
    <div class="tagline">Great food. Cold drinks. Live music.</div>
    <div class="meta">
      <span>Lunch &amp; Dinner</span><div class="dot"></div>
      <span>Live Entertainment</span><div class="dot"></div>
      <span>Catering</span>
    </div>
  </div>
  <div class="domain">captains-table.com</div>
</div>
</body>
</html>
